<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>自用中文油库里生成器</title>
    <meta name="description" content="自用中文油库里语音生成工具">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="static/index.css">
    <script src="xlib/vendor/pinyin-browser.js"></script>
    <script src="xlib/vendor/pinyinToKana.js"></script>
    <script src="xlib/vendor/number-to-chinese-words.min.js"></script>
    <script src="xlib/vendor/wanakana.js"></script>
    <script src="static/converter-data.js"></script>
    <script src="xlib/converter/converter.js"></script>
    <script src="xlib/vendor/jszip.min.js"></script>
    <script src="xlib/vendor/lame.min.js"></script>
    <script src="xlib/vendor/encoding.min.js"></script>
    <script src="xlib/unicorn-x86/unicorn-x86.min.js"></script>
    <script src="xlib/vendor/qmsg.min.js"></script>
    <script src="static/f1-data.js"></script>
    <script src="xlib/aquestalk/aquestalk.js"></script>
  </head>
  <body>
    <nav>
      <a class="brand">
        <span>自用中文油库里生成器</span>
      </a>
      <input id="bmenub" type="checkbox" class="show">
      <label for="bmenub" class="burger pseudo button">☰</label>
      <div class="menu"></div>
    </nav>
    
    <br>

    <main class="container app">
      <section class="intro">
        <h1>自用中文油库里生成器</h1>
        <p>输入中文，一键转换成合成文本并生成 f1 油库里语音。</p>
      </section>
      <label for="input"><b>中文输入</b></label>
      <textarea id="input" placeholder="请输入中文文本，例如：今天我们来玩塔防游戏，第一关路线要简单一点。"></textarea>

      <div class="control-row">
        <label for="speed"><b>语速 <span id="speednumber">100</span></b></label>
        <input type="range" min="50" max="300" value="100" step="10" id="speed" />
      </div>

      <fieldset class="options">
        <legend>预处理选项</legend>
        <label class="toggle-option">
          <span>自动删除空格</span>
          <input type="checkbox" id="auto-remove-spaces" checked>
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-state" aria-hidden="true"><span class="on">开启</span><span class="off">关闭</span></span>
        </label>
        <label class="toggle-option">
          <span>换行转句号</span>
          <input type="checkbox" id="newline-to-period" checked>
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-state" aria-hidden="true"><span class="on">开启</span><span class="off">关闭</span></span>
        </label>
        <label class="toggle-option">
          <span>中文标点转日语标点</span>
          <input type="checkbox" id="punctuation-to-japanese" checked>
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-state" aria-hidden="true"><span class="on">开启</span><span class="off">关闭</span></span>
        </label>
        <label class="toggle-option">
          <span>数字转中文</span>
          <input type="checkbox" id="number-to-chinese" checked>
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-state" aria-hidden="true"><span class="on">开启</span><span class="off">关闭</span></span>
        </label>
      </fieldset>

      <div class="actions">
        <button id="generate">一键生成语音</button>
        <button id="play" disabled>播放</button>
        <button id="download" disabled>保存/分享 WAV</button>
        <button id="download-mp3" disabled>保存/分享 MP3</button>
        <button id="copy" class="pseudo">复制合成文本</button>
      </div>

      <label for="synth-text"><b>最终送入合成器的文本</b></label>
      <textarea id="synth-text" placeholder="生成后会显示最终合成文本，也可以手动修改后重新生成。"></textarea>

      <p id="warning" class="message warning" hidden></p>
      <p id="error" class="message error" hidden></p>
    </main>
    
    <div class="container note">
      本工具为自用静态页面，只保留 f1 音声。合成核心基于 aquestalk.js，未改写合成核心。
    </div>
    
    <script src="static/index.js?v=6"></script>
  </body>
</html>
